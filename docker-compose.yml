services:
  api-gateway:
    build:
      context: .
      dockerfile: packages/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      TENANT_SERVICE_URL: http://tenant-service:3001
      PLAYER_SERVICE_URL: http://player-service:3002
      GAME_SERVICE_URL: http://game-service:3003
    depends_on:
      - tenant-service
      - player-service
      - game-service

  tenant-service:
    build:
      context: .
      dockerfile: packages/tenant-service/Dockerfile
    ports:
      - "3001:3001"

  player-service:
    build:
      context: .
      dockerfile: packages/player-service/Dockerfile
    ports:
      - "3002:3002"

  game-service:
    build:
      context: .
      dockerfile: packages/game-service/Dockerfile
    ports:
      - "3003:3003"
