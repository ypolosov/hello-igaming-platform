version: '3.9'

services:
  api-gateway:
    build:
      context: ./packages/api-gateway
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      TENANT_SERVICE_URL: http://tenant-service:3001
      PLAYER_SERVICE_URL: http://player-service:3002
      GAME_SERVICE_URL: http://game-service:3003
    depends_on:
      - tenant-service
      - player-service
      - game-service

  tenant-service:
    build:
      context: ./packages/tenant-service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"

  player-service:
    build:
      context: ./packages/player-service
      dockerfile: Dockerfile
    ports:
      - "3002:3002"

  game-service:
    build:
      context: ./packages/game-service
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
