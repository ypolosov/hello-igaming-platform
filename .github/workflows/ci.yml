name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fitness-gates:
    name: ADR Fitness Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ADR-002 Tenant Isolation + ADR-004 No External DB
        run: npm run test:fitness

  unit-tests:
    name: Unit Tests (all services)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm test

  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [fitness-gates, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./packages/api-gateway
          push: false
          tags: igaming/api-gateway:${{ github.sha }}
      - name: Build tenant-service
        uses: docker/build-push-action@v5
        with:
          context: ./packages/tenant-service
          push: false
          tags: igaming/tenant-service:${{ github.sha }}
      - name: Build player-service
        uses: docker/build-push-action@v5
        with:
          context: ./packages/player-service
          push: false
          tags: igaming/player-service:${{ github.sha }}
      - name: Build game-service
        uses: docker/build-push-action@v5
        with:
          context: ./packages/game-service
          push: false
          tags: igaming/game-service:${{ github.sha }}
